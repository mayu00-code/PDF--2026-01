<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All-in-One PDF Expert</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', 'sans-serif'; }
        .ghost { opacity: 0.3; background: #cbd5e1; border: 2px dashed #64748b; }
        .active-tab { border-bottom: 3px solid #3b82f6; color: #3b82f6; font-weight: 700; }
        .pdf-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .pdf-card:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        #drop-area.dragover { border-color: #3b82f6; background-color: #eff6ff; transform: scale(1.01); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- ナビゲーション & タブ -->
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex items-center justify-between h-16 border-b">
                <div class="flex items-center gap-2">
                    <div class="bg-red-500 p-1.5 rounded-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                        </svg>
                    </div>
                    <span class="text-xl font-bold text-gray-800 tracking-tight">PDF Expert Tool</span>
                </div>
                <div class="flex gap-4">
                    <button id="reset-btn" class="text-gray-500 hover:text-red-500 text-sm font-medium transition">全消去</button>
                    <button id="main-action-btn" disabled class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-full font-bold shadow-md transition-all disabled:opacity-30 disabled:cursor-not-allowed flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd" />
                        </svg>
                        PDFを書き出し
                    </button>
                </div>
            </div>
            <div class="flex space-x-8 h-12">
                <button onclick="switchTab('merge')" id="tab-merge" class="tab-item active-tab flex items-center px-1">結合・編集</button>
                <button onclick="switchTab('split')" id="tab-split" class="tab-item flex items-center px-1">分割・抽出</button>
                <button onclick="switchTab('number')" id="tab-number" class="tab-item flex items-center px-1">ページ番号付与</button>
                <button onclick="switchTab('convert')" id="tab-convert" class="tab-item flex items-center px-1">画像から変換</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6">
        
        <!-- オプションパネル (各機能用) -->
        <div id="options-panel" class="mb-6 bg-white p-4 rounded-xl shadow-sm border border-gray-100 hidden">
            <!-- ページ番号オプション -->
            <div id="opt-number" class="hidden flex flex-wrap gap-6 items-center">
                <div class="flex flex-col">
                    <label class="text-xs text-gray-500 mb-1">配置位置</label>
                    <select id="num-pos" class="border rounded p-1 text-sm outline-none bg-white">
                        <option value="bottom-center">下中央</option>
                        <option value="bottom-right">下右</option>
                        <option value="bottom-left">下左</option>
                        <option value="top-center">上中央</option>
                    </select>
                </div>
                <div class="flex flex-col">
                    <label class="text-xs text-gray-500 mb-1">形式</label>
                    <select id="num-format" class="border rounded p-1 text-sm outline-none bg-white">
                        <option value="simple">1, 2, ...</option>
                        <option value="ratio">1 / 5, 2 / 5, ...</option>
                    </select>
                </div>
                <div class="flex flex-col">
                    <label class="text-xs text-gray-500 mb-1">フォントサイズ</label>
                    <input type="number" id="num-size" value="12" class="border rounded p-1 text-sm w-16 outline-none">
                </div>
                <div class="flex items-center gap-2 mt-4">
                    <input type="checkbox" id="num-start-one" checked>
                    <label for="num-start-one" class="text-sm">1から開始</label>
                </div>
            </div>
            <!-- 画像変換オプション -->
            <div id="opt-convert" class="hidden flex flex-wrap gap-6 items-center">
                <div class="flex flex-col">
                    <label class="text-xs text-gray-500 mb-1">出力形式</label>
                    <div class="flex items-center gap-4">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="convert-mode" value="merge" checked>
                            <span class="text-sm">1つのPDFに結合</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="convert-mode" value="single">
                            <span class="text-sm">各画像を個別に変換</span>
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <!-- アップロードエリア -->
        <div id="drop-area" class="border-2 border-dashed border-gray-300 rounded-2xl p-10 text-center bg-white hover:border-blue-400 transition-all cursor-pointer mb-8">
            <input type="file" id="file-input" multiple class="hidden">
            <div class="flex flex-col items-center gap-2">
                <div class="bg-blue-50 p-4 rounded-full">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                    </svg>
                </div>
                <p class="text-lg font-semibold text-gray-700">ここにファイルをドロップ</p>
                <p class="text-sm text-gray-400">PDF, JPG, PNGに対応（クラウドから直接移動も可）</p>
            </div>
        </div>

        <!-- ローディング -->
        <div id="loading" class="hidden py-10 text-center">
            <div class="inline-block animate-spin rounded-full h-10 w-10 border-4 border-blue-500 border-t-transparent"></div>
            <p id="loading-text" class="mt-4 text-gray-600 font-medium">処理中...</p>
        </div>

        <!-- ページグリッド -->
        <div id="page-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4"></div>

        <!-- 空表示 -->
        <div id="empty-hint" class="text-center py-20 text-gray-300">
            <p class="text-xl">表示するページがありません</p>
            <p class="text-sm mt-2">ファイルを読み込むと、ここにページが並びます</p>
        </div>
    </main>

    <script>
        const { PDFDocument, rgb, StandardFonts } = PDFLib;
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let currentTab = 'merge';
        let pages = []; // { id, type, sourceData, pageNum, thumbnail, fileName }

        const fileInput = document.getElementById('file-input');
        const dropArea = document.getElementById('drop-area');
        const pageGrid = document.getElementById('page-grid');
        const loading = document.getElementById('loading');
        const mainActionBtn = document.getElementById('main-action-btn');
        const resetBtn = document.getElementById('reset-btn');
        const emptyHint = document.getElementById('empty-hint');
        const optionsPanel = document.getElementById('options-panel');

        // タブ切り替え
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-item').forEach(el => el.classList.remove('active-tab'));
            document.getElementById(`tab-${tab}`).classList.add('active-tab');
            
            // オプションパネル表示制御
            optionsPanel.classList.toggle('hidden', !['number', 'convert'].includes(tab));
            document.getElementById('opt-number').classList.toggle('hidden', tab !== 'number');
            document.getElementById('opt-convert').classList.toggle('hidden', tab !== 'convert');

            updateActionBtnLabel();
            renderGrid();
        }

        function updateActionBtnLabel() {
            const labels = {
                merge: 'PDFを結合して保存',
                split: '選択ページを抽出・保存',
                number: '番号を付けて保存',
                convert: 'PDFに変換して保存'
            };
            mainActionBtn.innerHTML = `<span>${labels[currentTab]}</span>`;
        }

        // 並び替え初期化
        new Sortable(pageGrid, {
            animation: 150,
            ghostClass: 'ghost',
            onEnd: () => {
                const newIds = Array.from(pageGrid.children).map(c => c.dataset.id);
                pages = newIds.map(id => pages.find(p => p.id === id));
                renderGrid();
            }
        });

        // ドラッグ&ドロップ
        dropArea.onclick = () => fileInput.click();
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(e => {
            dropArea.addEventListener(e, (evt) => {
                evt.preventDefault();
                evt.stopPropagation();
            });
        });
        dropArea.addEventListener('dragover', () => dropArea.classList.add('dragover'));
        dropArea.addEventListener('dragleave', () => dropArea.classList.remove('dragover'));
        dropArea.addEventListener('drop', (e) => {
            dropArea.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

        async function handleFiles(fileList) {
            loading.classList.remove('hidden');
            emptyHint.classList.add('hidden');
            
            for (const file of fileList) {
                if (file.type === 'application/pdf') {
                    await processPDF(file);
                } else if (file.type.startsWith('image/')) {
                    await processImage(file);
                }
            }
            
            renderGrid();
            loading.classList.add('hidden');
            mainActionBtn.disabled = pages.length === 0;
        }

        async function processPDF(file) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const viewport = page.getViewport({ scale: 0.4 });
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                await page.render({ canvasContext: context, viewport: viewport }).promise;
                
                pages.push({
                    id: Math.random().toString(36).substr(2, 9),
                    type: 'pdf',
                    sourceData: arrayBuffer,
                    pageNum: i,
                    thumbnail: canvas.toDataURL(),
                    fileName: file.name
                });
            }
        }

        async function processImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    pages.push({
                        id: Math.random().toString(36).substr(2, 9),
                        type: 'image',
                        sourceData: e.target.result,
                        thumbnail: e.target.result,
                        fileName: file.name
                    });
                    resolve();
                };
                reader.readAsDataURL(file);
            });
        }

        function renderGrid() {
            pageGrid.innerHTML = '';
            pages.forEach((page, idx) => {
                const div = document.createElement('div');
                div.className = 'pdf-card bg-white rounded-lg border border-gray-200 overflow-hidden relative group cursor-grab active:cursor-grabbing';
                div.dataset.id = page.id;
                div.innerHTML = `
                    <div class="aspect-[3/4] bg-gray-50 flex items-center justify-center p-1">
                        <img src="${page.thumbnail}" class="max-h-full max-w-full shadow-sm">
                    </div>
                    <div class="p-2 bg-white flex items-center justify-between border-t text-[10px]">
                        <span class="bg-gray-800 text-white px-1.5 py-0.5 rounded font-bold">${idx + 1}</span>
                        <span class="truncate max-w-[80px] text-gray-500 px-1">${page.fileName}</span>
                        <button onclick="removePage('${page.id}')" class="text-gray-300 hover:text-red-500">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>
                    </div>
                `;
                pageGrid.appendChild(div);
            });
            emptyHint.classList.toggle('hidden', pages.length > 0);
            mainActionBtn.disabled = pages.length === 0;
        }

        window.removePage = (id) => {
            pages = pages.filter(p => p.id !== id);
            renderGrid();
        };

        resetBtn.onclick = () => {
            if (confirm('すべてのページをクリアしますか？')) {
                pages = [];
                renderGrid();
            }
        };

        // PDF作成メインロジック
        mainActionBtn.onclick = async () => {
            document.getElementById('loading-text').innerText = 'PDFを生成しています...';
            loading.classList.remove('hidden');

            try {
                if (currentTab === 'convert' && document.querySelector('input[name="convert-mode"]:checked').value === 'single') {
                    // 個別変換
                    for (let i = 0; i < pages.length; i++) {
                        const pdf = await createPdfFromSelection([pages[i]]);
                        downloadPdf(pdf, `converted_${i + 1}.pdf`);
                    }
                } else {
                    // 通常の結合・編集・番号付与
                    const pdf = await createPdfFromSelection(pages);
                    downloadPdf(pdf, `output_${new Date().getTime()}.pdf`);
                }
            } catch (err) {
                console.error(err);
                alert('エラーが発生しました: ' + err.message);
            }

            loading.classList.add('hidden');
        };

        async function createPdfFromSelection(selection) {
            const outDoc = await PDFDocument.create();
            const font = await outDoc.embedFont(StandardFonts.Helvetica);
            const totalPages = selection.length;
            const format = document.getElementById('num-format').value;

            for (let i = 0; i < selection.length; i++) {
                const item = selection[i];
                if (item.type === 'pdf') {
                    const src = await PDFDocument.load(item.sourceData);
                    const [copied] = await outDoc.copyPages(src, [item.pageNum - 1]);
                    outDoc.addPage(copied);
                } else {
                    const imgBytes = await fetch(item.sourceData).then(r => r.arrayBuffer());
                    const img = item.sourceData.includes('png') ? await outDoc.embedPng(imgBytes) : await outDoc.embedJpg(imgBytes);
                    const page = outDoc.addPage([img.width, img.height]);
                    page.drawImage(img, { x: 0, y: 0, width: img.width, height: img.height });
                }

                // ページ番号付与 (numberタブの場合のみ)
                if (currentTab === 'number') {
                    const lastPage = outDoc.getPage(outDoc.getPageCount() - 1);
                    const { width, height } = lastPage.getSize();
                    const fontSize = parseInt(document.getElementById('num-size').value) || 12;
                    const pos = document.getElementById('num-pos').value;
                    
                    let currentPageNum = document.getElementById('num-start-one').checked ? i + 1 : i;
                    let pageText = currentPageNum.toString();
                    
                    if (format === 'ratio') {
                        pageText = `${currentPageNum} / ${totalPages}`;
                    }
                    
                    const textWidth = font.widthOfTextAtSize(pageText, fontSize);
                    
                    let x = width / 2 - textWidth / 2, y = 20;
                    if (pos === 'bottom-left') x = 30;
                    if (pos === 'bottom-right') x = width - textWidth - 30;
                    if (pos === 'top-center') y = height - 30;

                    lastPage.drawText(pageText, { x, y, size: fontSize, font, color: rgb(0.1, 0.1, 0.1) });
                }
            }
            return await outDoc.save();
        }

        function downloadPdf(bytes, filename) {
            const blob = new Blob([bytes], { type: 'application/pdf' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
